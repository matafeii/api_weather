<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Погода в Кракове</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>
  <body>
    <canvas id="weather-canvas"></canvas>
    <div class="weather-effects" id="weather-effects"></div>
    <div class="loader-3d" id="loader-3d">
      <div class="loader-sphere"></div>
    </div>
    <div class="scroll-indicator" id="scroll-indicator">
      <span>↓</span>
    </div>
    <div class="weather-container">
      <h1>Погода</h1>

      <div class="controls">
        <select id="city-select" class="city-select">
          <option value="krakow">Краков</option>
          <option value="warsaw">Варшава</option>
          <option value="gdansk">Гданьск</option>
          <option value="wroclaw">Вроцлав</option>
          <option value="poznan">Познань</option>
          <option value="lodz">Лодзь</option>
          <option value="lublin">Люблин</option>
          <option value="bydgoszcz">Быдгощ</option>
        </select>
        <button id="map-btn" class="gps-btn" title="Выбрать город на карте">
          🗺️
        </button>
        <button id="gps-btn" class="gps-btn" title="Определить местоположение">
          📍
        </button>
      </div>

      <div class="city-name" id="city-name">Краков</div>

      <div class="weather-info">
        <div class="temperature">
          <span id="temp">--</span>
          <span class="unit">°C</span>
        </div>
        <div class="description" id="description">Загрузка...</div>
        <div class="details">
          <div class="detail-item">
            <span class="label">Влажность:</span>
            <span id="humidity">--</span>
            <span class="unit">%</span>
          </div>
          <div class="detail-item">
            <span class="label">Ветер:</span>
            <span id="wind">--</span>
            <span class="unit">км/ч</span>
          </div>
        </div>
      </div>

      <div class="hourly-forecast" id="hourly-forecast">
        <h3>Погода на 5 часов</h3>
        <div class="hourly-list" id="hourly-list"></div>
      </div>

      <div class="map-container" id="map-container">
        <div id="map"></div>
      </div>

      <button id="refresh-btn" class="refresh-btn">Обновить</button>
    </div>
    <script src="js/java.js"></script>
  </body>
</html>
